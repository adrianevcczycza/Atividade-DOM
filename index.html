<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade DOM</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Open+Sans&family=Lato&family=Montserrat&family=Poppins&family=Oswald&family=Raleway&family=Nunito&family=Ubuntu&family=Playfair+Display&family=Merriweather&family=Inter&family=PT+Sans&family=Fira+Sans&family=Quicksand&display=swap" rel="stylesheet">
</head>
<body>

    <h1 id="titulo">Título Principal</h1>
    <p id="paragrafo">Este é um parágrafo de exemplo.</p>

   
    <div class="contador">
        <h2 id="contador">0</h2>
        <button onclick="aumentar()">Aumentar</button>
        <button onclick="diminuir()">Diminuir</button>
    </div>

   
    <div class="botoes">
        <button onclick="corFundo()">Alterar Cor de Fundo</button>
        <button onclick="corTitulo()">Alterar Cor do Título</button>
        <button onclick="corParagrafo()">Alterar Cor do Parágrafo</button>
        <button onclick="fonteTitulo()">Alterar Fonte do Título</button>
        <button onclick="fonteParagrafo()">Alterar Fonte do Parágrafo</button>
        <button onclick="alterarTudo()">Alterar Tudo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
